[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 5173

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[env.production]
  [env.production.build.environment]
    NODE_ENV = "production"

[env.staging]
  [env.staging.build.environment]
    NODE_ENV = "production"
